services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: observability
      POSTGRES_PASSWORD: observability
      POSTGRES_DB: agent_observability
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observability -d agent_observability"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "9090:9090"
    env_file: .env
    environment:
      DATABASE_URL: postgres://observability:observability@postgres:5432/agent_observability
      AUTO_MIGRATE: "true"
      PORT: "9090"
      NODE_ENV: "production"
      # The dedicated worker below owns the alert sweeper. Exactly one
      # sweeper may run — remove the worker service AND this line to fall
      # back to the zero-config inline sweeper.
      ALERT_SWEEPER: "off"
    depends_on:
      postgres:
        condition: service_healthy

  # Background worker — alert sweeper + webhook delivery retries. Same
  # image as the app, different entrypoint; no ports, just a job loop.
  worker:
    build: .
    command: ["bun", "src/worker.ts"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://observability:observability@postgres:5432/agent_observability
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
