services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: observability
      POSTGRES_PASSWORD: observability
      POSTGRES_DB: agent_observability
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observability -d agent_observability"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "9090:9090"
    env_file: .env
    environment:
      DATABASE_URL: postgres://observability:observability@postgres:5432/agent_observability
      AUTO_MIGRATE: "true"
      PORT: "9090"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
