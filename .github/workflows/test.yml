name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        run: bun install --frozen-lockfile

      - name: Run server tests
        run: bun test ./tests/

      - name: Install UI dependencies
        working-directory: packages/ui
        run: bun install --frozen-lockfile

      - name: Run UI tests
        working-directory: packages/ui
        run: bun test

  vitest-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install vitest plugin dependencies
        working-directory: plugins/vitest-agent-observability
        run: bun install --frozen-lockfile

      - name: Build vitest plugin
        working-directory: plugins/vitest-agent-observability
        run: bun run build

      - name: Run vitest plugin tests
        working-directory: plugins/vitest-agent-observability
        run: bunx vitest run

  pytest-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync pytest plugin dependencies
        working-directory: plugins/pytest-agent-observability
        run: uv sync --extra dev

      - name: Run pytest plugin tests
        working-directory: plugins/pytest-agent-observability
        run: uv run pytest -v
