name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        run: bun install --frozen-lockfile

      - name: Run server tests
        run: bun test ./tests/

      - name: Install UI dependencies
        working-directory: packages/ui
        run: bun install --frozen-lockfile

      - name: Run UI tests
        working-directory: packages/ui
        run: bun test

  observability-sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync agent-observability-sdk (Python) dependencies
        working-directory: plugins/agent-observability-sdk
        run: uv sync --extra dev

      - name: Run agent-observability-sdk (Python) tests
        working-directory: plugins/agent-observability-sdk
        run: uv run pytest -v

  observability-sdk-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install agent-observability-sdk (Node) dependencies
        working-directory: plugins/agent-observability-sdk-node
        run: bun install --frozen-lockfile

      - name: Build agent-observability-sdk (Node)
        working-directory: plugins/agent-observability-sdk-node
        run: bun run build

      - name: Run agent-observability-sdk (Node) tests
        working-directory: plugins/agent-observability-sdk-node
        run: bunx vitest run
