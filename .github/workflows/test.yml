name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: observability
          POSTGRES_PASSWORD: observability
          POSTGRES_DB: agent_observability
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U observability -d agent_observability"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        run: bun install --frozen-lockfile

      - name: Run server tests
        run: bun test ./tests/

      # Separate bun process on purpose: tests/ mocks ../src/db.js and bun
      # shares one module registry per process — the integration suite
      # needs the real client. Applies migrations itself.
      - name: Run alert-trigger integration tests
        env:
          DATABASE_URL: postgres://observability:observability@localhost:5432/agent_observability
        run: bun run test:integration

      - name: Install UI dependencies
        working-directory: packages/ui
        run: bun install --frozen-lockfile

      - name: Run UI tests
        working-directory: packages/ui
        run: bun test

  observability-sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # No enable-cache: uv.lock is gitignored (loose deps is the SDK
        # convention — published packages don't pin transitives), and
        # setup-uv requires a lockfile to compute the cache key.
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync agent-observability-sdk (Python) dependencies
        working-directory: plugins/agent-observability-sdk
        run: uv sync --extra dev

      - name: Run agent-observability-sdk (Python) tests
        working-directory: plugins/agent-observability-sdk
        run: uv run pytest -v

  observability-sdk-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install agent-observability-sdk (Node) dependencies
        working-directory: plugins/agent-observability-sdk-node
        run: bun install --frozen-lockfile

      - name: Build agent-observability-sdk (Node)
        working-directory: plugins/agent-observability-sdk-node
        run: bun run build

      - name: Run agent-observability-sdk (Node) tests
        working-directory: plugins/agent-observability-sdk-node
        run: bunx vitest run
